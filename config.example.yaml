# MySQL Transfer Configuration
# ============================

source:
  host: "mysql.example.com"
  port: 3306
  user: "[USERNAME]"
  password: "[PASSWORD]"
  database: "database_name"
  charset: "utf8mb4"
  ssh:
    enabled: true
    host: "[IP_ADDRESS]"
    port: 22
    user: "[USERNAME]"
    # password: "ssh_password"
    key_file: "/path/to/key_file"

destination:
  host: "[IP_ADDRESS]"
  port: 3306
  user: "[USERNAME]"
  password: "[PASSWORD]"
  database: "database_name"
  charset: "utf8mb4"

options:
  tables: []
  exclude_tables: []
  chunk_size: 10000
  workers: 4
  drop_existing: false
  truncate: false
  incremental: false
  incremental_column: ""
  include_views: false
  include_routines: false
  include_triggers: false
  dry_run: false
